name: Build, publish, and deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: equities-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: stagingeastusacr77.azurecr.io
  IMAGE: parallel-ocean-equities

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            monetary/package-lock.json
      - run: go test ./...
      - run: npm ci
        working-directory: web
      - run: npm run typecheck
        working-directory: web
      - run: npm test -- --run
        working-directory: web
      - run: npm ci
        working-directory: monetary
      - run: npm run typecheck
        working-directory: monetary
      - run: npm test -- --run
        working-directory: monetary

  image:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v7
      - id: meta
        shell: bash
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v4
      - name: Log in to Azure
        if: github.event_name == 'push'
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Log in to ACR
        if: github.event_name == 'push'
        run: az acr login --name stagingeastusacr77
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:main-latest
          labels: org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Roll AKS deployment
        env:
          TAG: ${{ needs.image.outputs.tag }}
        run: |
          az aks command invoke \
            --resource-group staging-rg \
            --name staging-aks-cluster \
            --command "kubectl -n equities set image deploy/parallel-ocean-equities equities=${REGISTRY}/${IMAGE}:${TAG} && kubectl -n equities rollout status deploy/parallel-ocean-equities --timeout=4m"
